version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///onboardpro.db
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH}
      - WORKABLE_API_KEY=${WORKABLE_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: pytest tests/test_api.py -v --full-trace -vv
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
      - TESTING=true
      - DATABASE_URL=sqlite:///test.db
      - SECRET_KEY=test_secret_key
      - TELEGRAM_BOT_TOKEN=test_token
      - GOOGLE_CREDENTIALS_PATH=test_path
      - WORKABLE_API_KEY=test_key

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html
      - ./frontend/dist:/usr/share/nginx/html/dist
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
