version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: onboardpro
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: onboardpro_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  postgres_data:
