<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardPro - Вход в систему</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  </head>
  <body
    class="bg-background min-h-screen font-sans flex items-center justify-center"
  >
    <div class="bg-white p-6 md:p-8 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-bold text-primary mb-6 text-center">
        Вход в OnboardPro
      </h2>
      <form id="login-form">
        <div class="mb-4">
          <label class="block text-sm font-medium text-secondary mb-1"
            >Email</label
          >
          <input
            type="email"
            id="email"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-accent"
            required
          />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-secondary mb-1"
            >Пароль</label
          >
          <input
            type="password"
            id="password"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-accent"
            required
          />
        </div>
        <button
          type="submit"
          class="w-full bg-primary text-white p-3 rounded-lg hover:bg-blue-700 transition"
        >
          Войти
        </button>
      </form>
    </div>
    <script src="/login.js"></script>
  </body>
</html>
