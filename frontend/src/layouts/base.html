<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardPro - {{ title }}</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background min-h-screen font-sans">
    <header class="bg-primary text-white p-4 sticky top-0 shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">OnboardPro</h1>
        <nav class="space-x-2" id="nav-links">
          <!-- Навигация будет добавлена через JavaScript в зависимости от роли -->
        </nav>
      </div>
    </header>
    <main class="container mx-auto p-4 md:p-6">{{ content }}</main>
    <footer class="bg-gray-800 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p>© 2025 magna_mentes. Все права защищены.</p>
      </div>
    </footer>
    <script>
      // Управление навигацией в зависимости от роли пользователя
      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "/src/login.html";
          return;
        }

        // Получаем информацию о пользователе
        fetch("http://localhost:8000/users/me", {
          headers: { Authorization: `Bearer ${token}` },
        })
          .then((response) => response.json())
          .then((user) => {
            const navLinks = document.getElementById("nav-links");
            const links = [{ href: "/src/dashboard.html", text: "Мои задачи" }];

            if (user.role === "hr" || user.role === "manager") {
              links.push({
                href: "/src/manager_dashboard.html",
                text: "Управление задачами",
              });
            }

            navLinks.innerHTML = links
              .map(
                (link) => `
              <a href="${link.href}" 
                 class="px-3 py-2 hover:bg-blue-700 rounded inline-block">
                ${link.text}
              </a>
            `
              )
              .join("");
          })
          .catch(() => {
            window.location.href = "/src/login.html";
          });
      });
    </script>
  </body>
</html>
