<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardPro - Обратная связь</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background min-h-screen font-sans">
    <header class="bg-primary text-white p-4 sticky top-0 shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">OnboardPro</h1>
        <nav class="space-x-2" id="nav-links">
          <!-- Навигация добавляется через JavaScript -->
        </nav>
      </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
      <div class="space-y-6">
        <h2 class="text-2xl font-bold text-gray-800">Обратная связь</h2>

        <form id="feedback-form" class="bg-white p-6 rounded-lg shadow-md">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Получатель</label
            >
            <select
              id="recipient_id"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-accent"
              required
            >
              <!-- Список пользователей будет добавлен через JavaScript -->
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Задача (опционально)</label
            >
            <select
              id="task_id"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-accent"
            >
              <option value="">Выберите задачу</option>
              <!-- Список задач будет добавлен через JavaScript -->
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Сообщение</label
            >
            <textarea
              id="message"
              rows="4"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-accent"
              required
            ></textarea>
          </div>
          <div class="text-right">
            <button
              type="submit"
              class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
            >
              Отправить
            </button>
          </div>
        </form>

        <div class="space-y-4">
          <h3 class="text-xl font-semibold text-gray-800">
            История обратной связи
          </h3>
          <div id="feedback-list" class="space-y-4">
            <!-- Отзывы будут добавлены через JavaScript -->
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p>© 2025 magna_mentes. Все права защищены.</p>
      </div>
    </footer>

    <script src="/src/js/navigation.js"></script>
    <script src="/src/feedback.js"></script>
  </body>
</html>
