<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardPro - Управление задачами</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background min-h-screen font-sans">
    <header class="bg-primary text-white p-4 sticky top-0 shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">OnboardPro</h1>
        <nav class="space-x-2" id="nav-links">
          <!-- Навигация добавляется через JavaScript -->
        </nav>
      </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
      <div class="space-y-6">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-bold text-gray-800">
            Управление задачами онбординга
          </h2>
          <button
            id="create-task-btn"
            class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition"
          >
            Создать задачу
          </button>
        </div>

        <!-- Форма создания задачи -->
        <div
          id="task-form"
          class="hidden bg-white p-6 rounded-lg shadow-lg mb-6"
        >
          <h3 class="text-xl font-semibold mb-4">Создание новой задачи</h3>
          <form id="new-task-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >План онбординга</label
              >
              <select
                id="plan-select"
                class="w-full px-3 py-2 border rounded-lg"
                required
              >
                <!-- Планы будут добавлены через JavaScript -->
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Сотрудник</label
              >
              <select
                id="user-select"
                class="w-full px-3 py-2 border rounded-lg"
                required
              >
                <!-- Сотрудники будут добавлены через JavaScript -->
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Название задачи</label
              >
              <input
                type="text"
                id="task-title"
                class="w-full px-3 py-2 border rounded-lg"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Описание</label
              >
              <textarea
                id="task-description"
                class="w-full px-3 py-2 border rounded-lg"
                rows="3"
              ></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Приоритет</label
              >
              <select
                id="task-priority"
                class="w-full px-3 py-2 border rounded-lg"
                required
              >
                <option value="low">Низкий</option>
                <option value="medium">Средний</option>
                <option value="high">Высокий</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Срок выполнения</label
              >
              <input
                type="date"
                id="task-deadline"
                class="w-full px-3 py-2 border rounded-lg"
                required
              />
            </div>
            <div class="flex justify-end space-x-2">
              <button
                type="button"
                id="cancel-task-btn"
                class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition"
              >
                Отмена
              </button>
              <button
                type="submit"
                class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition"
              >
                Создать
              </button>
            </div>
          </form>
        </div>

        <!-- Форма создания плана (только для HR) -->
        <div
          id="plan-form"
          class="hidden bg-white p-6 rounded-lg shadow-lg mb-6"
        >
          <h3 class="text-xl font-semibold mb-4">
            Создание нового плана онбординга
          </h3>
          <form id="new-plan-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Название плана</label
              >
              <input
                type="text"
                id="plan-title"
                class="w-full px-3 py-2 border rounded-lg"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Роль</label
              >
              <select
                id="plan-role"
                class="w-full px-3 py-2 border rounded-lg"
                required
              >
                <option value="employee">Сотрудник</option>
                <option value="manager">Менеджер</option>
                <option value="hr">HR</option>
              </select>
            </div>
            <div class="flex justify-end space-x-2">
              <button
                type="button"
                id="cancel-plan-btn"
                class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition"
              >
                Отмена
              </button>
              <button
                type="submit"
                class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition"
              >
                Создать
              </button>
            </div>
          </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Секция планов онбординга -->
          <div>
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-semibold text-gray-800">
                Планы онбординга
              </h3>
              <button
                id="create-plan-btn"
                class="text-sm text-primary hover:text-blue-700"
              >
                + Создать план
              </button>
            </div>
            <div id="plans-container" class="space-y-4">
              <!-- Планы будут добавлены через JavaScript -->
            </div>
          </div>

          <!-- Секция активных задач -->
          <div>
            <h3 class="text-xl font-semibold text-gray-800 mb-4">
              Активные задачи
            </h3>
            <div class="flex space-x-2 mb-4">
              <select id="status-filter" class="px-3 py-2 border rounded-lg">
                <option value="all">Все статусы</option>
                <option value="pending">Ожидает</option>
                <option value="in_progress">В процессе</option>
                <option value="completed">Завершено</option>
              </select>
              <select id="priority-filter" class="px-3 py-2 border rounded-lg">
                <option value="all">Все приоритеты</option>
                <option value="high">Высокий</option>
                <option value="medium">Средний</option>
                <option value="low">Низкий</option>
              </select>
            </div>
            <div id="tasks-container" class="space-y-4">
              <!-- Задачи будут добавлены через JavaScript -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p>© 2025 magna_mentes. Все права защищены.</p>
      </div>
    </footer>

    <script src="/src/manager_dashboard.js"></script>
  </body>
</html>
