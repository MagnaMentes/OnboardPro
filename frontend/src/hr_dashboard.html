<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Dashboard - OnboardPro</title>
    <link href="dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="bg-background min-h-screen font-sans">
    <header class="bg-primary text-white p-4 sticky top-0 shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">OnboardPro</h1>
        <nav class="space-x-2" id="nav-links">
          <!-- Навигация будет добавлена через JavaScript -->
        </nav>
      </div>
    </header>

    <main class="container mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-primary mb-8">HR Dashboard</h1>

      <!-- Статистика -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-2">Всего задач</h3>
          <p id="total-tasks" class="text-3xl font-bold text-accent">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-2">
            Выполнено задач
          </h3>
          <p id="completed-tasks" class="text-3xl font-bold text-accent">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-2">
            Процент выполнения
          </h3>
          <p id="completion-rate" class="text-3xl font-bold text-accent">0%</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-2">
            Отзывов на сотрудника
          </h3>
          <p id="feedback-per-user" class="text-3xl font-bold text-accent">0</p>
        </div>
      </div>

      <!-- Графики -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-4">
            Прогресс по отделам
          </h3>
          <canvas id="department-progress"></canvas>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-semibold text-primary mb-4">
            Тренды выполнения задач
          </h3>
          <canvas id="completion-trends"></canvas>
        </div>
      </div>

      <!-- Календарь задач -->
      <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-semibold text-primary mb-4">Календарь задач</h3>
        <div id="tasks-calendar" class="space-y-4"></div>
      </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p>© 2025 magna_mentes. Все права защищены.</p>
      </div>
    </footer>

    <script src="js/navigation.js"></script>
    <script src="hr_dashboard.js"></script>
  </body>
</html>
