<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardPro - Интеграции</title>
    <link href="dist/output.css" rel="stylesheet" />
  </head>
  <body class="bg-background min-h-screen font-sans">
    <div id="content" class="container mx-auto p-4 space-y-6">
      <h2 class="text-2xl font-bold text-primary mb-6">Интеграции</h2>

      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Telegram Integration -->
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h3 class="text-xl font-semibold mb-4">Telegram</h3>
          <form id="telegram-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Telegram ID</label
              >
              <input
                type="text"
                id="telegram-id"
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-primary text-white p-3 rounded-lg hover:bg-blue-700 transition"
            >
              Подключить Telegram
            </button>
          </form>
        </div>

        <!-- Google Calendar Integration -->
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h3 class="text-xl font-semibold mb-4">Google Calendar</h3>
          <form id="calendar-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >ID Задачи</label
              >
              <input
                type="number"
                id="task-id"
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-primary text-white p-3 rounded-lg hover:bg-blue-700 transition"
            >
              Создать событие
            </button>
          </form>
        </div>

        <!-- Workable Integration -->
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h3 class="text-xl font-semibold mb-4">Workable</h3>
          <form id="workable-form" class="space-y-4">
            <p class="text-sm text-gray-600 mb-4">
              Импортируйте сотрудников из Workable в OnboardPro.
            </p>
            <button
              type="submit"
              class="w-full bg-primary text-white p-3 rounded-lg hover:bg-blue-700 transition"
            >
              Импортировать сотрудников
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="integrations.js"></script>
  </body>
</html>
